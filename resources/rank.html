<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>排行榜</title>
</head>
<body>
    <h1>排行榜</h1>
    <ul id="rankList"></ul>

    <script>
        // 请求后端 JSON 接口
        fetch('/rank/top')
        .then(response => response.json())
        .then(data => {
            const ul = document.getElementById('rankList');
            data.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.user + " : " + item.score;
                ul.appendChild(li);
            });
        })
        .catch(err => {
            console.error('Fetch error:', err);
            document.getElementById('rankList').textContent = '加载失败';
        });
    </script>
</body>
</html>
