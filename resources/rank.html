<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>排行榜</title>
</head>
<body>

<h1>排行榜</h1>
<ul id="rankList"></ul>

<script>
fetch("/rank/top")
    .then(response => response.json())
    .then(data => {
        let ul = document.getElementById("rankList");
        data.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item.user + " : " + item.score;
            ul.appendChild(li);
        });
    });
</script>

</body>
</html>
